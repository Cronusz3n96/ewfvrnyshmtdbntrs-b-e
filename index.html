<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chudoogle</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --bg2: #111;
      --border: #2a2a2a;
      --orange: #ff6a00;
      --orange-dim: #c45200;
      --text: #cccccc;
      --text-dim: #666;
      --tab-h: 36px;
      --bar-h: 38px;
      --bm-h: 28px;
      --win-chrome: #1a1a1a;
      --dot-r: #ff5f57;
      --dot-y: #ffbd2e;
      --dot-g: #28ca42;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── TITLE BAR ── */
    #titlebar {
      background: var(--win-chrome);
      border-bottom: 1px solid var(--border);
      height: 32px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
      position: relative;
    }
    .win-dots { display: flex; gap: 6px; align-items: center; }
    .dot {
      width: 12px; height: 12px; border-radius: 50%; cursor: pointer;
      transition: filter 0.15s;
    }
    .dot:hover { filter: brightness(1.3); }
    .dot-r { background: var(--dot-r); }
    .dot-y { background: var(--dot-y); }
    .dot-g { background: var(--dot-g); }
    #titlebar-label {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em;
      pointer-events: none;
    }

    /* ── TABS ── */
    #tabrow {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      height: var(--tab-h);
      display: flex;
      align-items: flex-end;
      padding: 0 8px;
      gap: 2px;
      overflow-x: auto;
      overflow-y: hidden;
      flex-shrink: 0;
    }
    #tabrow::-webkit-scrollbar { height: 3px; }
    #tabrow::-webkit-scrollbar-track { background: transparent; }
    #tabrow::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .tabs { display: flex; gap: 2px; align-items: flex-end; }

    .tab {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 0 10px;
      height: 28px;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      min-width: 120px; max-width: 200px;
      border-radius: 4px 4px 0 0;
      transition: background 0.1s, color 0.1s;
      position: relative;
      white-space: nowrap; overflow: hidden;
    }
    .tab img { width: 14px; height: 14px; object-fit: contain; flex-shrink: 0; }
    .tab span { overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .tab.active {
      background: var(--win-chrome);
      color: var(--text);
      border-color: var(--orange);
      border-bottom-color: var(--win-chrome);
    }
    .tab.active::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 1px; background: var(--win-chrome);
    }
    .closetab {
      margin-left: 4px; color: var(--text-dim); font-style: normal;
      flex-shrink: 0; font-size: 13px; line-height: 1;
      padding: 2px;
    }
    .closetab:hover { color: var(--dot-r); }

    #newtab {
      background: transparent; border: none; color: var(--text-dim);
      font-size: 18px; cursor: pointer; padding: 0 8px;
      height: 28px; display: flex; align-items: center;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    #newtab:hover { color: var(--orange); background: rgba(255,106,0,0.08); }

    /* ── NAVBAR ── */
    #navbar {
      background: var(--win-chrome);
      border-bottom: 1px solid var(--border);
      height: var(--bar-h);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 6px;
      flex-shrink: 0;
      overflow: hidden;
      max-height: 0;
      border-bottom-width: 0;
      transition: max-height 0.25s ease, border-bottom-width 0.25s;
    }
    #navbar.open {
      max-height: var(--bar-h);
      border-bottom-width: 1px;
    }
    .nav-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'Courier New', monospace;
      font-size: 13px; cursor: pointer;
      width: 28px; height: 28px; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .nav-btn:hover { color: var(--orange); border-color: var(--orange); background: rgba(255,106,0,0.08); }
    .nav-btn:active { transform: scale(0.93); }

    #bar {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      padding: 0 10px;
      height: 28px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #bar:focus { border-color: var(--orange); box-shadow: 0 0 0 2px rgba(255,106,0,0.15); }
    #bar::selection { background: var(--orange); color: #000; }

    .nav-right { display: flex; gap: 4px; }

    /* ── BOOKMARKS ── */
    #bookmarkrow {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      height: var(--bm-h);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 4px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    #bookmarkrow::-webkit-scrollbar { height: 2px; }
    #bookmarkrow::-webkit-scrollbar-thumb { background: var(--border); }

    .bookmarks { display: flex; gap: 4px; align-items: center; }

    .bookmark {
      display: flex; align-items: center; gap: 5px;
      padding: 2px 8px; border-radius: 3px;
      font-size: 11px; color: var(--text-dim);
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .bookmark img { width: 14px; height: 14px; object-fit: contain; }
    .bookmark:hover { border-color: var(--border); color: var(--orange); background: rgba(255,106,0,0.06); }

    /* ── FRAMES ── */
    #browserframecontainer {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .viewframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
      display: none;
      background: #fff;
    }
    .viewframe.active { display: block; }

    /* ── NEWTAB PAGE ── */
    #newtab-page {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: var(--bg);
    }
    #newtab-page.active { display: flex; }

    .chudoogle-logo {
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(36px, 7vw, 72px);
      font-weight: bold;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 4px;
    }
    .chudoogle-logo .c1 { color: var(--orange); }
    .chudoogle-logo .c2 { color: #cc0000; }
    .chudoogle-logo .c3 { color: #e8a000; }
    .chudoogle-logo .c4 { color: var(--orange); }
    .chudoogle-logo .c5 { color: #888; }
    .chudoogle-logo .c6 { color: #cc0000; }
    .chudoogle-logo .c7 { color: #aaa; }
    .chudoogle-logo .c8 { color: var(--orange); }
    .chudoogle-logo .c9 { color: #888; }

    .logo-sub {
      font-size: 10px; color: var(--text-dim);
      letter-spacing: 0.3em; text-transform: uppercase;
      margin-top: -8px;
    }

    #newtab-search-wrap {
      display: flex; gap: 0;
      width: min(600px, 90vw);
    }
    #newtab-bar {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 3px 0 0 3px;
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 0 14px;
      height: 40px;
      outline: none;
      transition: border-color 0.15s;
    }
    #newtab-bar:focus { border-color: var(--orange); }
    #newtab-go {
      background: var(--orange); border: 1px solid var(--orange);
      border-radius: 0 3px 3px 0;
      color: #000; font-family: 'Courier New', monospace;
      font-size: 12px; font-weight: bold;
      padding: 0 18px; cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }
    #newtab-go:hover { background: var(--orange-dim); border-color: var(--orange-dim); }

    .newtab-shortcuts {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      max-width: 500px;
    }
    .shortcut {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      width: 70px; cursor: pointer;
      padding: 8px 6px; border-radius: 4px; border: 1px solid transparent;
      transition: border-color 0.15s, background 0.15s;
    }
    .shortcut:hover { border-color: var(--border); background: rgba(255,255,255,0.03); }
    .shortcut img { width: 28px; height: 28px; border-radius: 6px; }
    .shortcut span { font-size: 10px; color: var(--text-dim); text-align: center; }

    .newtab-status {
      font-size: 10px; color: var(--text-dim);
      letter-spacing: 0.15em;
    }
    .newtab-status span { color: var(--orange); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
  </style>
</head>
<body>

<!-- TITLE BAR -->
<div id="titlebar">
  <div class="win-dots">

  </div>
  <span id="titlebar-label">chudoogle</span>
  <button id="navbar-toggle" onclick="toggleNavbar()" title="Toggle navigation bar" style="position:absolute;right:10px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;padding:4px 6px;border-radius:3px;transition:color .15s,transform .2s;">&#9660;</button>
</div>

<!-- TABS -->
<div id="tabrow">
  <div class="tabs"></div>

</div>

<!-- NAVBAR -->
<div id="navbar">
  <button class="nav-btn" onclick="back()" title="Back">&#8592;</button>

<!-- FRAME CONTAINER -->
<div id="browserframecontainer">
  <!-- newtab page injected here per tab, managed in JS -->
</div>

<!-- SCRIPTS -->
<script src="/baremux/index.js"></script>
<script src="/scram/scramjet.codecs.js"></script>
<script>
  // Stub out deps if running standalone (preview mode)
  if (typeof BareMux === 'undefined') {
    window.BareMux = { BareMuxConnection: class { setTransport(){}; async getTransport(){return true;} } };
  }
  if (typeof $scramjetLoadController === 'undefined') {
    window.$scramjetLoadController = () => ({
      ScramjetController: class {
        constructor(){}
        init(){}
        encodeUrl(u){return u;}
        decodeUrl(u){return u;}
      }
    });
  }
</script>
<script>
// ─────────────────────────────────────────────
//  CHUDOOGLE — proxy engine
// ─────────────────────────────────────────────

const connection = new BareMux.BareMuxConnection("/baremux/worker.js");
const defaultWispUrl =
  (window.location.protocol === "https:" ? "wss://" : "ws://") +
  window.location.host + "/socket/";
const wispUrl = defaultWispUrl;
const selectedTransport = localStorage.getItem("cherri_transport") || "libcurl";

switch (selectedTransport) {
  case "libcurl":
    connection.setTransport("/libcurl/index.mjs", [{ websocket: wispUrl }]);
    break;
  case "epoxy":
    connection.setTransport("/epoxy/index.mjs", [{ wisp: wispUrl }]);
    break;
  default:
    connection.setTransport("/libcurl/index.mjs", [{ websocket: wispUrl }]);
}

const bar = document.getElementById("bar");
const { ScramjetController } = $scramjetLoadController();
const scramjet = new ScramjetController({
  files: {
    all: "/scram/scramjet.all.js",
    wasm: "/scram/scramjet.wasm.wasm",
    sync: "/scram/scramjet.sync.js",
  },
});
scramjet.init();

let activeTab = 0;
let tabs = [];
let tabCounter = 1;

// ── NEWTAB PAGE MANAGEMENT ──
function createNewtabPage(id) {
  const page = document.createElement("div");
  page.id = `newtab-page-${id}`;
  page.classList.add("newtab-page");
  page.style.cssText = `
    position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;gap:28px;background:#fff;
  `;
  page.innerHTML = `

      .cg-logo { font-family:'Fredoka One',cursive;font-size:clamp(52px,11vw,100px);font-weight:400;letter-spacing:2px;line-height:1;text-align:center;-webkit-text-stroke:3px rgba(0,0,0,0.12);paint-order:stroke fill; }

      .cg-search-wrap input::placeholder { color:#7ab3cb; }
      .cg-go { background:none;border:none;cursor:pointer;color:#9aa0a6;font-size:18px;padding:2px 4px;transition:color .15s;flex-shrink:0; }
      .cg-go:hover { color:#4285F4; }
      .cg-shortcuts { display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:560px; }
      .cg-shortcut { display:flex;flex-direction:column;align-items:center;gap:8px;width:88px;cursor:pointer;padding:14px 8px 12px;border-radius:12px;border:1px solid transparent;transition:background .15s,border-color .15s; }

      .cg-shortcut span { font-family:Arial,sans-serif;font-size:12px;color:#202124;text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    </style>
    <div class="cg-logo">
      <span class="l-c">c</span><span class="l-h">h</span><span class="l-u">u</span><span class="l-d">d</span><span class="l-o1">o</span><span class="l-o2">o</span><span class="l-g">g</span><span class="l-l">l</span><span class="l-e">e</span>
    </div>
    <div class="cg-search-wrap">
      <svg class="cg-search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="newtab-bar-${id}" type="text" placeholder="Search or enter a URL" autocomplete="off" spellcheck="false">
      <button class="cg-go" onclick="newtabNav(${id})" title="Go">&#10142;</button>
    </div>
    <div class="cg-shortcuts">
      <div class="cg-shortcut" onclick="newtabNavDirect(${id},'https://youtube.com')">
        <div class="cg-shortcut-icon" style="background:#fff;border:1px solid #eee;">
          <svg width="28" height="20" viewBox="0 0 24 17"><path fill="#FF0000" d="M23.5 2.7a3 3 0 0 0-2.1-2.1C19.5 0 12 0 12 0S4.5 0 2.6.6A3 3 0 0 0 .5 2.7C0 4.6 0 8.5 0 8.5s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1C4.5 17 12 17 12 17s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 12.4 24 8.5 24 8.5s0-3.9-.5-5.8z"/><polygon fill="#fff" points="9.75,12 15.5,8.5 9.75,5"/></svg>

          <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/></svg>
        </div>
        <span>TikTok</span>
      </div>
      <div class="cg-shortcut" onclick="newtabNavDirect(${id},'https://instagram.com')">
        <div class="cg-shortcut-icon" style="background:radial-gradient(circle at 30% 107%,#fdf497 0%,#fdf497 5%,#fd5949 45%,#d6249f 60%,#285AEB 90%);">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none"/></svg>
        </div>
        <span>Instagram</span>
      </div>
      <div class="cg-shortcut" onclick="newtabNavDirect(${id},'https://twitter.com')">
        <div class="cg-shortcut-icon" style="background:#000;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </div>
        <span>X / Twitter</span>
      </div>
      <div class="cg-shortcut" onclick="newtabNavDirect(${id},'https://twitch.tv')">

          <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
        </div>
        <span>Twitch</span>
      </div>
      <div class="cg-shortcut" onclick="newtabNavDirect(${id},'https://reddit.com')">
        <div class="cg-shortcut-icon" style="background:#FF4500;">
          <svg width="24" height="24" viewBox="0 0 20 20" fill="white"><circle cx="10" cy="10" r="10" fill="#FF4500"/><path fill="white" d="M16.67 10a1.46 1.46 0 0 0-2.47-1 7.12 7.12 0 0 0-3.85-1.23l.65-3.08 2.13.45a1 1 0 1 0 1-1 1 1 0 0 0-.93.61l-2.38-.5a.27.27 0 0 0-.32.2l-.73 3.44a7.14 7.14 0 0 0-3.89 1.23 1.46 1.46 0 1 0-1.61 2.39 2.87 2.87 0 0 0 0 .44c0 2.24 2.61 4.06 5.83 4.06s5.83-1.82 5.83-4.06a2.87 2.87 0 0 0 0-.44 1.46 1.46 0 0 0 .65-1.21zm-9.5 1a1 1 0 1 1 1 1 1 1 0 0 1-1-1zm5.17 2.63a3.07 3.07 0 0 1-2.34.6 3.07 3.07 0 0 1-2.34-.6.28.28 0 0 1 .38-.4 2.53 2.53 0 0 0 2 .45 2.53 2.53 0 0 0 2-.45.28.28 0 0 1 .38.4zm-.17-1.63a1 1 0 1 1 1-1 1 1 0 0 1-1 1z"/></svg>
        </div>
        <span>Reddit</span>
      </div>
    </div>
  `;
  document.getElementById("browserframecontainer").appendChild(page);

  const input = page.querySelector(`#newtab-bar-${id}`);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") newtabNav(id); });
  return page;
}

function newtabNav(id) {
  const input = document.getElementById(`newtab-bar-${id}`);
  if (!input || !input.value.trim()) return;
  activeTab = id;
  nav(input.value.trim());
}

function newtabNavDirect(id, url) {
  activeTab = id;
  nav(url);
}

function showNewtabPage(id) {
  document.querySelectorAll(".newtab-page").forEach(p => p.style.display = "none");
  document.querySelectorAll(".viewframe").forEach(f => f.classList.remove("active"));
  const page = document.getElementById(`newtab-page-${id}`);
  if (page) { page.style.display = "flex"; page.style.flexDirection = "column"; }
  setTimeout(() => { const inp = document.getElementById(`newtab-bar-${id}`); if(inp) inp.focus(); }, 50);
}

function hideNewtabPage(id) {
  const page = document.getElementById(`newtab-page-${id}`);
  if (page) page.style.display = "none";
}

// ── TABS ──
function newTab() {
  const tabContainer = document.querySelector(".tabs");
  const newTabData = { id: tabCounter++, title: "New Tab", url: "", history: [], historyIndex: -1 };
  tabs.push(newTabData);
  if (!tabContainer) return;

  const tab = document.createElement("div");
  tab.classList.add("tab");
  tab.dataset.tabId = newTabData.id;
  tab.innerHTML = `
    <img src="/assets/img/fav.png" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><rect width=%2216%22 height=%2216%22 rx=%222%22 fill=%22%23333%22/></svg>'" alt="" data-fav-id="${newTabData.id}">
    <span>New Tab</span>
    <i class="closetab" onclick="closeTab(${newTabData.id})">✕</i>
  `;
  tab.addEventListener("click", (e) => { if (!e.target.closest(".closetab")) switchTab(newTabData.id); });
  tabContainer.appendChild(tab);

  const tabFrame = document.createElement("iframe");
  tabFrame.classList.add("viewframe", "browser-frame");
  tabFrame.dataset.frameId = newTabData.id;
  tabFrame.setAttribute("allowfullscreen", "true");
  document.getElementById("browserframecontainer").appendChild(tabFrame);

  createNewtabPage(newTabData.id);
  switchTab(newTabData.id);
}

function switchTab(id) {
  activeTab = id;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", parseInt(t.dataset.tabId) === id));
  document.querySelectorAll(".viewframe").forEach(f => f.classList.toggle("active", parseInt(f.dataset.frameId) === id));
  document.querySelectorAll(".newtab-page").forEach(p => p.style.display = "none");

  const currentTab = tabs.find(t => t.id === id);
  if (!currentTab) return;

  if (!currentTab.url) {
    showNewtabPage(id);
  }

  if (bar) bar.value = currentTab.url || "";
  updateTitlebar(currentTab);
}

function closeTab(id) {
  if (tabs.length <= 1) return;
  const tabIndex = tabs.findIndex(t => t.id === id);
  if (tabIndex === -1) return;
  tabs.splice(tabIndex, 1);
  document.querySelector(`.tab[data-tab-id="${id}"]`)?.remove();
  document.querySelector(`.viewframe[data-frame-id="${id}"]`)?.remove();
  document.getElementById(`newtab-page-${id}`)?.remove();
  if (activeTab === id) {
    const newActive = tabs[Math.max(0, tabIndex - 1)];
    if (newActive) switchTab(newActive.id);
  }
}

function updateTitlebar(tab) {
  const label = document.getElementById("titlebar-label");
  if (label) label.textContent = tab.title !== "New Tab" ? tab.title : "chudoogle";
}

// ── NAVIGATION ──
function nav(i) {
  if (!i.trim()) return;
  let url = i.trim();
  if (!url.includes(".") && !url.startsWith("http")) {
    url = "https://duckduckgo.com/?q=" + encodeURIComponent(url);
  } else if (!url.startsWith("http://") && !url.startsWith("https://")) {
    url = "https://" + url;
  }
  const currentTab = tabs.find(t => t.id === activeTab);
  if (!currentTab) return;
  currentTab.history.push(url);
  currentTab.historyIndex++;
  currentTab.url = url;
  hideNewtabPage(activeTab);
  go(scramjet.encodeUrl(url));
}

function updateElements(frameEl) {
  try {
    const currentTab = tabs.find(t => t.id === activeTab);
    if (!currentTab) return;
    const currentSrc = frameEl.contentWindow.location.href;
    let decodedUrl = scramjet.decodeUrl(currentSrc);
    if (decodedUrl && decodedUrl !== currentTab.url) {
      currentTab.url = decodedUrl;
      if (bar) bar.value = decodedUrl;
      const favicon = document.querySelector(`.tab img[data-fav-id="${activeTab}"]`);
      if (favicon) favicon.src = `https://www.google.com/s2/favicons?domain=${decodedUrl}&sz=128`;
    }
  } catch (e) {}
}

async function go(i) {
  if (!(await connection.getTransport())) {
    connection.setTransport("/libcurl/index.mjs", [{ websocket: wispUrl }]);
  }
  const frame = document.querySelector(`.viewframe[data-frame-id="${activeTab}"]`);
  if (!frame) return;
  const currentTab = tabs.find(t => t.id === activeTab);
  const tab = document.querySelector(`.tab[data-tab-id="${activeTab}"]`);
  if (tab) {
    const title = tab.querySelector("span");
    if (title) title.textContent = "Loading...";
  }
  if (bar) bar.value = currentTab.url;

  frame.classList.add("active");
  frame.src = i;
  frame.onload = () => {
    try {
      const frameDoc = frame.contentDocument || frame.contentWindow.document;
      const frameTitle = frameDoc.title || new URL(currentTab.url).hostname;
      currentTab.title = frameTitle;
      const tabEl = document.querySelector(`.tab[data-tab-id="${activeTab}"]`);
      if (tabEl) tabEl.querySelector("span").textContent = frameTitle;
      updateTitlebar(currentTab);
      updateElements(frame);
    } catch (e) { updateElements(frame); }
  };
}

function goHome() {
  const currentTab = tabs.find(t => t.id === activeTab);
  if (currentTab) { currentTab.url = ""; currentTab.title = "New Tab"; }
  const tab = document.querySelector(`.tab[data-tab-id="${activeTab}"]`);
  if (tab) tab.querySelector("span").textContent = "New Tab";
  const frame = document.querySelector(`.viewframe[data-frame-id="${activeTab}"]`);
  if (frame) { frame.classList.remove("active"); frame.src = "about:blank"; }
  showNewtabPage(activeTab);
  if (bar) bar.value = "";
  updateTitlebar({ title: "New Tab" });
}

function back() {
  const currentTab = tabs.find(t => t.id === activeTab);
  if (!currentTab || currentTab.historyIndex <= 0) return;
  currentTab.historyIndex--;
  const url = currentTab.history[currentTab.historyIndex];
  currentTab.url = url;
  hideNewtabPage(activeTab);
  go(scramjet.encodeUrl(url));
}

function forward() {
  const currentTab = tabs.find(t => t.id === activeTab);
  if (!currentTab || currentTab.historyIndex >= currentTab.history.length - 1) return;
  currentTab.historyIndex++;
  const url = currentTab.history[currentTab.historyIndex];
  currentTab.url = url;
  hideNewtabPage(activeTab);
  go(scramjet.encodeUrl(url));
}

function refresh() {
  const frame = document.querySelector(`.viewframe[data-frame-id="${activeTab}"]`);
  if (frame && frame.src && frame.src !== "about:blank") frame.src = frame.src;
}

function fullscreen() {
  const frame = document.querySelector(`.viewframe[data-frame-id="${activeTab}"]`);
  if (frame) frame.requestFullscreen().catch(() => document.documentElement.requestFullscreen());
}

function popout() {
  const frame = document.querySelector(`.viewframe[data-frame-id="${activeTab}"]`);
  if (frame && frame.src) window.open(frame.src, "_blank");
}

// ── BAR EVENTS ──
function toggleNavbar() {
  const nb = document.getElementById("navbar");
  const btn = document.getElementById("navbar-toggle");
  const open = nb.classList.toggle("open");
  btn.style.transform = open ? "rotate(180deg)" : "";
}

bar.addEventListener("keydown", (e) => { if (e.key === "Enter") nav(bar.value.trim()); });
bar.addEventListener("focus", () => bar.select());

// ── BOOKMARKS ──
const BookmarkManager = {
  bmContainer: document.querySelector(".bookmarks"),
  bookmarks: JSON.parse(localStorage.getItem("cherri_bookmarks")) || [],
  async loadBookmarks() {
    const bookmarks = JSON.parse(localStorage.getItem("cherri_bookmarks")) || [];
    this.bookmarks = bookmarks;
    this.bmContainer.innerHTML = "";
    bookmarks.forEach((bm, index) => {
      const el = document.createElement("div");
      el.classList.add("bookmark");
      el.innerHTML = `<img src="https://s2.googleusercontent.com/s2/favicons?domain=${bm.url}&sz=128" alt=""> <span>${bm.label || new URL(bm.url).hostname}</span>`;
      el.onclick = () => nav(bm.url);
      el.oncontextmenu = (e) => { e.preventDefault(); if (confirm(`Delete bookmark: ${bm.url}?`)) this.deleteBookmark(index); };
      this.bmContainer.appendChild(el);
    });
    const addBtn = document.createElement("div");
    addBtn.classList.add("bookmark");
    addBtn.innerHTML = `<span style="color:var(--orange)">+</span> <span>Bookmark</span>`;
    addBtn.onclick = () => this.addBookmark();
    this.bmContainer.appendChild(addBtn);
  },
  async addBookmark() {
    const currentTab = tabs.find(t => t.id === activeTab);
    const defaultUrl = currentTab?.url || "";
    const url = prompt("URL:", defaultUrl);
    if (!url) return;
    const label = prompt("Label:", url.replace(/https?:\/\//, "").split("/")[0]);
    this.bookmarks.push({ url, label });
    localStorage.setItem("cherri_bookmarks", JSON.stringify(this.bookmarks));
    this.loadBookmarks();
  },
  deleteBookmark(index) {
    this.bookmarks.splice(index, 1);
    localStorage.setItem("cherri_bookmarks", JSON.stringify(this.bookmarks));
    this.loadBookmarks();
  },
};

// ── INIT ──
newTab();
BookmarkManager.loadBookmarks();
</script>
</body>
